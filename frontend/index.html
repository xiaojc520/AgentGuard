<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentGuard - Arc AI Agents</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0d1117 60%,#1a0505 100%);padding:1.5rem 2rem;border-bottom:1px solid #ef444430;display:flex;align-items:center;justify-content:space-between}
.header h1{color:#ef4444;font-size:1.8rem;font-weight:700;letter-spacing:-.5px}
.tag{background:#ef444420;color:#ef4444;padding:.3rem .9rem;border-radius:9999px;font-size:.78rem;border:1px solid #ef444430}
.wallet-bar{background:#0d1117;padding:.9rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid #ffffff10}
.btn-connect{background:#ef4444;color:#fff;padding:.55rem 1.5rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.88rem;transition:all .2s}
.btn-connect:hover{background:#dc2626}
.btn-connected{background:#166534;padding:.55rem 1.5rem;border:none;border-radius:8px;cursor:default;font-weight:600;font-size:.88rem;color:#4ade80}
.info{font-size:.85rem;color:#94a3b8}
.container{max-width:800px;margin:2rem auto;padding:0 1.5rem}
.features{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;margin-bottom:2rem}
.feature{background:#ffffff04;padding:.85rem 1rem;border-radius:10px;border:1px solid #ffffff08;font-size:.86rem;color:#cbd5e1;display:flex;align-items:center;gap:.6rem}
.feature .check{color:#22c55e;font-weight:bold}
.card{background:#0d1117;border:1px solid #ffffff0c;border-radius:14px;padding:1.5rem;margin-bottom:1.2rem}
.card h3{color:#f1f5f9;margin-bottom:1.1rem;font-size:1.05rem;font-weight:600}
.input-row{display:flex;gap:.7rem;align-items:center;margin-bottom:.8rem}
.input-row input,.input-row select{background:#0a0e1a;border:1px solid #ffffff18;color:#e2e8f0;padding:.72rem 1rem;border-radius:8px;flex:1;font-size:.9rem;width:100%;outline:none;transition:border .2s}
.input-row input:focus,.input-row select:focus{border-color:#ef444550}
.input-row input::placeholder{color:#4b5563}
.btn-action{background:#ef4444;color:#fff;padding:.72rem 1.4rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.88rem;white-space:nowrap;transition:all .2s;flex-shrink:0}
.btn-action:hover{background:#dc2626}
.result-box{background:#080b12;border:1px dashed #ffffff15;border-radius:10px;padding:1rem 1.1rem;margin-top:.8rem;font-size:.84rem;color:#94a3b8;min-height:48px;white-space:pre-wrap;overflow-x:auto;font-family:'Cascadia Code','Fira Code',Consolas,monospace;line-height:1.55}
.footer{text-align:center;padding:2.5rem;color:#334155;font-size:.78rem}
.footer a{color:#ef4444;text-decoration:none}
.footer a:hover{text-decoration:underline}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#6b7280;margin-right:.5rem;vertical-align:middle}
.status-dot.connected{background:#22c55e;box-shadow:0 0 6px #22c55e66}
@media(max-width:650px){.header h1{font-size:1.4rem}.input-row{flex-direction:column}.btn-action{width:100%}}
</style>
</head>
<body>
<div class="header"><h1>AgentGuard</h1><span class="tag">AI Risk Monitor</span></div>
<div class="wallet-bar">
    <button id="connectBtn" class="btn-connect" onclick="connectWallet()">Connect Wallet</button>
    <span class="info" id="walletInfo"><span class="status-dot"></span>Not connected</span>
</div>
<div class="container">
<div class="features">
    <div class="feature"><span class="check">✓</span> Multi-factor risk assessment</div>
    <div class="feature"><span class="check">✓</span> Custom alert rules engine</div>
    <div class="feature"><span class="check">✓</span> Blacklist / whitelist mgmt</div>
    <div class="feature"><span class="check">✓</span> Real-time alert lifecycle</div>
    <div class="feature"><span class="check">✓</span> On-chain audit trail</div>
</div>

<div class="card">
    <h3>Assess My Risk</h3>
    <button class="btn-action" onclick="assessMyRisk()" style="width:auto">Check Connected Wallet</button>
    <div id="riskRes" class="result-box"></div>
</div>

<div class="card">
    <h3>Assess Any Address</h3>
    <label style="font-size:.82rem;color:#64748b;margin-bottom:.35rem;display:block">Enter wallet address to check:</label>
    <div class="input-row">
        <input id="riskAddr" type="text" placeholder="0x..." />
        <button class="btn-action" onclick="assessRisk()">Assess</button>
    </div>
    <div id="customRiskRes" class="result-box"></div>
</div>

<div class="card">
    <h3>Alert History (All)</h3>
    <div class="input-row">
        <input id="offsetInput" type="number" placeholder="Offset" value="0" style="flex:.5" />
        <input id="limitInput" type="number" placeholder="Limit" value="10" style="flex:.5" />
        <button class="btn-action" onclick="getAllAlerts()">Load Alerts</button>
    </div>
    <div id="alertHistRes" class="result-box"></div>
</div>

<div class="card">
    <h3>System Stats</h3>
    <button class="btn-action" onclick="loadStats()" style="width:auto">Refresh Stats</button>
    <div id="statsRes" class="result-box"></div>
</div>
</div>

<div class="footer"><p>Powered by <a href="https://arc.io" target="_blank">Arc Network</a> | Chain ID 5042002</p></div>

<script>
// ─── Read-only provider (always hits Arc RPC, independent of MetaMask network) ──
const ARC_RPC = "https://rpc.testnet.arc.network";
const ARC_CHAIN_ID = 5042002;
const ARC_CHAIN_ID_HEX = "0x4cf7e2"; // 5042002 in hex

let readProvider, readContract;   // read-only (RPC)
let signer, writeContract;        // write (MetaMask)
let currentAddress = "";

const CA = "0x7bB05bE291B33CFCB7BFb8A0b66Db4cd049C412d";

const ABI = [
  "function getAssessment(address wallet) view returns (uint256 riskScore, uint8 level, uint256 lastAssessed, uint256 assessmentCount, bool isMonitored)",
  "function isFlagged(address wallet) view returns (bool)",
  "function isTrusted(address wallet) view returns (bool)",
  "function getMonitoredWallets(uint256 offset, uint256 limit) view returns (address[])",
  "function totalMonitored() view returns (uint256)",
  "function RISK_SCORE_MAX() view returns (uint256)",
  "function ALERT_THRESHOLD() view returns (uint256)",
  "function nextAlertId() view returns (uint256)",
  "function totalAlertsTriggered() view returns (uint256)",
  "function totalAlertsResolved() view returns (uint256)",
  "function getAllAlerts(uint256 offset, uint256 limit) view returns (tuple(uint256 id, address wallet, uint8 alertType, uint256 severity, string description, uint256 timestamp, bool acknowledged, bool resolved)[])",
  "function flagAddress(address wallet, string reason) external",
  "function unflagAddress(address wallet) external",
  "function trustAddress(address wallet) external",
  "function untrustAddress(address wallet) external",
  "function updateAlertRule(uint8 alertType, uint256 threshold, uint256 cooldownSeconds, bool enabled) external",
  "function startMonitoring(address wallet) external",
  "function stopMonitoring(address wallet) external",
  "function setRiskEngine(address newEngine) external",
  "function transferOwnership(address newOwner) external",
  "function owner() view returns (address)",
  "function riskEngine() view returns (address)"
];

const LEVELS = ["Safe", "Low", "Medium", "High", "Critical"];

// ─── Initialize read-only contract (works regardless of MetaMask network) ──
function initReadContract() {
  readProvider = new ethers.JsonRpcProvider(ARC_RPC);
  readContract = new ethers.Contract(CA, ABI, readProvider);
}
initReadContract();

// ─── Network switch helper ──
async function ensureArcNetwork() {
  try {
    const chainIdHex = await window.ethereum.request({ method: "eth_chainId" });
    if (parseInt(chainIdHex) !== ARC_CHAIN_ID) {
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: ARC_CHAIN_ID_HEX }],
        });
      } catch (switchErr) {
        // Chain not added yet → add it
        if (switchErr.code === 4902) {
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: ARC_CHAIN_ID_HEX,
              chainName: "Arc Testnet",
              rpcUrls: [ARC_RPC],
              nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
            }],
          });
        } else {
          throw switchErr;
        }
      }
    }
  } catch (e) {
    alert("Please switch MetaMask to Arc Testnet (Chain ID 5042002)\nError: " + e.message);
    return false;
  }
  return true;
}

async function connectWallet() {
  try {
    if (!window.ethereum) { alert("Please install MetaMask"); return; }
    // Switch to Arc network first
    if (!await ensureArcNetwork()) return;

    await window.ethereum.request({ method: "eth_requestAccounts" });
    signer = await (new ethers.BrowserProvider(window.ethereum)).getSigner();
    currentAddress = await signer.getAddress();

    // Write contract uses MetaMask signer
    writeContract = new ethers.Contract(CA, ABI, signer);

    const btn = document.getElementById("connectBtn");
    btn.className = "btn-connected";
    btn.textContent = currentAddress.slice(0, 6) + "..." + currentAddress.slice(-4);
    btn.onclick = null;

    document.getElementById("walletInfo").innerHTML =
      '<span class="status-dot connected"></span>' + currentAddress;
  } catch (e) {
    alert("Error: " + e.message);
  }
}

function showResult(id, data, isError) {
  const el = document.getElementById(id);
  el.textContent = JSON.stringify(data, null, 2);
  el.style.color = isError ? "#fca5a5" : "#86efac";
}

// ─── Assess (uses read-only contract, no MetaMask needed) ───
async function assessMyRisk() {
  if (!currentAddress) { alert("Connect wallet first"); return; }
  try {
    const r = await readContract.getAssessment(currentAddress);
    showResult("riskRes", {
      wallet: currentAddress,
      riskScore: Number(r[0]),
      level: LEVELS[Number(r[1])] || "Unknown",
      lastAssessed: Number(r[2]) > 0 ? new Date(Number(r[2]) * 1000).toLocaleString() : "Never",
      assessmentCount: Number(r[3]).toString(),
      isMonitored: r[4]
    });
  } catch (err) {
    showResult("riskRes", { error: err.reason || err.message }, true);
  }
}

async function assessRisk() {
  try {
    const addr = document.getElementById("riskAddr").value.trim();
    if (!addr) return;
    if (!ethers.isAddress(addr)) { alert("Invalid address"); return; }
    const r = await readContract.getAssessment(addr);
    showResult("customRiskRes", {
      wallet: addr,
      riskScore: Number(r[0]),
      level: LEVELS[Number(r[1])] || "Unknown",
      lastAssessed: Number(r[2]) > 0 ? new Date(Number(r[2]) * 1000).toLocaleString() : "Never",
      assessmentCount: Number(r[3]).toString(),
      isMonitored: r[4]
    });
  } catch (err) {
    showResult("customRiskRes", { error: err.reason || err.message }, true);
  }
}

async function getAllAlerts() {
  try {
    const offset = parseInt(document.getElementById("offsetInput").value) || 0;
    const limit = parseInt(document.getElementById("limitInput").value) || 10;
    const alerts = await readContract.getAllAlerts(offset, limit);
    showResult("alertHistRes", alerts.map(a => ({
      id: Number(a[0]),
      wallet: a[1],
      alertType: Number(a[2]),
      severity: Number(a[3]),
      description: a[4],
      time: Number(a[5]) > 0 ? new Date(Number(a[5]) * 1000).toLocaleString() : ""
    })));
  } catch (err) {
    showResult("alertHistRes", { error: err.reason || err.message }, true);
  }
}

async function loadStats() {
  try {
    const [maxScore, thresh, nextId, triggered, resolved, monitored] = await Promise.all([
      readContract.RISK_SCORE_MAX(),
      readContract.ALERT_THRESHOLD(),
      readContract.nextAlertId(),
      readContract.totalAlertsTriggered(),
      readContract.totalAlertsResolved(),
      readContract.totalMonitored()
    ]);
    showResult("statsRes", {
      maxRiskScore: maxScore.toString(),
      alertThreshold: thresh.toString(),
      nextAlertId: nextId.toString(),
      totalTriggered: triggered.toString(),
      totalResolved: resolved.toString(),
      monitoredWallets: monitored.toString()
    });
  } catch (err) {
    showResult("statsRes", { error: err.reason || err.message }, true);
  }
}

// ─── Write operations (need MetaMask) ───
async function flagAddrFn() {
  if (!writeContract) { alert("Connect wallet first (and switch to Arc Testnet)"); return; }
  try {
    const addr = document.getElementById("flagAddr").value.trim();
    const reason = document.getElementById("flagReason").value.trim();
    if (!addr || !reason) { alert("Fill in address and reason"); return; }
    const tx = await writeContract.flagAddress(addr, reason);
    showResult("addrRes", { status: "Submitted", txHash: tx.hash });
    await tx.wait();
    showResult("addrRes", { status: "Flagged!", address: addr, reason });
  } catch (err) {
    showResult("addrRes", { error: err.reason || err.message }, true);
  }
}

async function trustAddrFn() {
  if (!writeContract) { alert("Connect wallet first (and switch to Arc Testnet)"); return; }
  try {
    const addr = document.getElementById("trustAddr").value.trim();
    if (!addr) { alert("Enter address"); return; }
    const tx = await writeContract.trustAddress(addr);
    showResult("addrRes", { status: "Submitted", txHash: tx.hash });
    await tx.wait();
    showResult("addrRes", { status: "Trusted!", address: addr });
  } catch (err) {
    showResult("addrRes", { error: err.reason || err.message }, true);
  }
}

// Auto-check on load
if (window.ethereum && window.ethereum.selectedAddress) {
  connectWallet();
}
</script>
</body>
</html>
